<!-- Mostly taken from @aquova's tutorial -->
<!DOCTYPE html>
<html>
    <head>
        <title>Chip-8 Interpreter</title>
        <meta charset="utf-8">
    </head>
    <body>
    <center>
        <h1>Chip-8 Interpreter</h1>
        <div>
            <label for="rominput">Upload a Chip-8 game: </label>
            <input type="file" id="rominput" autocomplete="off"/>
        </div>
        <br/>
        <form id="mode selector">
            <label><input type="radio" id="mode1" name="mode" value="Octo" checked required>Octo</label>
            <label><input type="radio" id="mode2" name="mode" value="SUPERCHIP">SUPERCHIP</label>
            <label><input type="radio" id="mode3" name="mode" value="COSMAC">COSMAC</label>
        </form>
        <br/>
        <canvas id="canvas">Your browser doesn't support HTML5</canvas>
    </center>
    </body>
    <script type="module" src="index.js"></script>
</html>
